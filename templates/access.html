<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Required - SyncMeta</title>
  <style>
    :root{--black:#000;--z950:#0a0a0b;--z900:#18181b;--z800:#27272a;--z700:#3f3f46;--z600:#52525b;--z500:#71717a;--z400:#a1a1aa;--z300:#d4d4d8;--z100:#f4f4f5;--white:#fff;--accent:#7c6df7;--accent2:#6c5ce7;--red:#f87171}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:var(--black);color:var(--z300);min-height:100vh;-webkit-font-smoothing:antialiased}
    .shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 600px 360px at 50% 30%,rgba(124,109,247,.08) 0%,transparent 70%)}
    .card{width:100%;max-width:460px;background:rgba(10,10,11,.85);border:1px solid var(--z800);border-radius:16px;padding:36px 28px;backdrop-filter:blur(20px);text-align:center}
    .badge{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--accent);margin-bottom:20px}
    .badge svg{width:20px;height:20px}
    h1{font-size:32px;font-weight:800;letter-spacing:-1px;color:var(--white);margin-bottom:12px}
    p{font-size:14px;line-height:1.6;color:var(--z400);margin-bottom:22px}
    form{text-align:left}
    label{display:block;font-size:11px;font-weight:600;color:var(--z500);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--z800);background:var(--z900);color:var(--z100);font-size:14px;font-family:inherit}
    input:focus{outline:none;border-color:var(--z600)}
    .error{margin-bottom:14px;padding:11px 12px;border-radius:8px;border:1px solid rgba(248,113,113,.28);background:rgba(127,29,29,.18);color:var(--red);font-size:13px}
    .btn{margin-top:16px;width:100%;padding:12px 18px;border-radius:999px;border:1px solid var(--accent2);background:linear-gradient(135deg,var(--accent2),#a78bfa);color:var(--white);font-size:14px;font-weight:700;cursor:pointer}
    .hint{margin-top:14px;font-size:12px;color:var(--z600);text-align:center}
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6v6H4z"/><path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/><path d="M17 14v3a2 2 0 01-2 2h-1"/><path d="M14 17h6"/></svg>
        SyncMeta
      </div>
      <h1>Private Access</h1>
      <p>This SyncMeta instance is protected by a shared site password before anyone can reach the app.</p>
      <form method="post" action="/access">
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <label for="password">Site Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="btn" type="submit">Enter SyncMeta</button>
      </form>
      <div class="hint">After access is granted, the browser keeps an essential access cookie for this site.</div>
    </div>
  </div>
</body>
</html>
