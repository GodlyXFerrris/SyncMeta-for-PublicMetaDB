services:
  syncmeta:
    image: ghcr.io/febsho/syncmeta:latest
    pull_policy: always
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      PROFILE_STORE_FILE: /app/data/profiles.json
      SYNCMETA_MASTER_KEY: ${SYNCMETA_MASTER_KEY:-}
      # Optional: add SITE_ACCESS_PASSWORD in your own override or env_file
      # if you want a shared password before the app loads.
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
